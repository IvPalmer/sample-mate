name: SampleMate
options:
  bundleIdPrefix: com.palmer
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Developer ID signing: stable designated requirement (Team ID + bundle ID) so the
    # macOS audio-capture (TCC) grant persists across rebuilds — and it's distribution-ready.
    # Hardened runtime + secure timestamp are required for notarization.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application"
    DEVELOPMENT_TEAM: C4SJBQAUZY
    CODE_SIGNING_REQUIRED: "YES"
    CODE_SIGNING_ALLOWED: "YES"
    ENABLE_HARDENED_RUNTIME: "YES"
    OTHER_CODE_SIGN_FLAGS: "--timestamp"
    # Enables the TCC preflight/request path in AudioRecordingPermission so the
    # system actually prompts for "audio capture" permission.
    SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) ENABLE_TCC_SPI"

targets:
  SampleMate:
    type: application
    platform: macOS
    sources:
      - path: SampleMate
    info:
      path: SampleMate/Info.plist
      properties:
        CFBundleDisplayName: Sample Mate
        CFBundleName: Sample Mate
        LSMinimumSystemVersion: "15.0"
        LSApplicationCategoryType: public.app-category.music
        NSHumanReadableCopyright: "© 2026"
        NSAudioCaptureUsageDescription: "Sample Mate captures audio from other apps (or all system output) so you can grab anything you play — YouTube, Spotify, Ableton, anywhere."
        NSHighResolutionCapable: true
    entitlements:
      path: SampleMate/SampleMate.entitlements
      properties:
        com.apple.security.get-task-allow: false   # required: notarization rejects this entitlement
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.palmer.SampleMate
        PRODUCT_NAME: SampleMate                               # → SampleMate.app (display name "Sample Mate")
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  SampleMateTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SampleMateTests
    dependencies:
      - target: SampleMate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.palmer.SampleMateTests
        GENERATE_INFOPLIST_FILE: "YES"
        # Logic test — run via xctest host directly, no app launch required.
        # Avoids "test runner hung" when the app needs Developer ID signing.
        TEST_HOST: ""
        BUNDLE_LOADER: ""

schemes:
  SampleMate:
    build:
      targets:
        SampleMate: all
        SampleMateTests: [test]
    test:
      targets:
        - SampleMateTests
