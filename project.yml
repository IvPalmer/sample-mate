name: SampleMate
options:
  bundleIdPrefix: com.palmer
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    # Disable debug-dylib split so all Swift symbols land in the app binary.
    # Required for BUNDLE_LOADER-based logic tests to resolve @testable import symbols.
    ENABLE_DEBUG_DYLIB: "NO"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Developer ID signing: stable designated requirement (Team ID + bundle ID) so the
    # macOS audio-capture (TCC) grant persists across rebuilds — and it's distribution-ready.
    # Hardened runtime + secure timestamp are required for notarization.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application"
    DEVELOPMENT_TEAM: C4SJBQAUZY
    CODE_SIGNING_REQUIRED: "YES"
    CODE_SIGNING_ALLOWED: "YES"
    ENABLE_HARDENED_RUNTIME: "YES"
    OTHER_CODE_SIGN_FLAGS: "--timestamp"
    # Enables the TCC preflight/request path in AudioRecordingPermission so the
    # system actually prompts for "audio capture" permission.
    SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) ENABLE_TCC_SPI"
  configs:
    Debug:
      # Keep Developer ID signing in Debug (inherited from base) so the designated
      # requirement stays Team-ID + bundle-ID stable and the audio-capture (TCC)
      # grant persists across rebuilds (see PLAN.md "Debugging notes"). Do NOT
      # switch to ad-hoc here — that gives a code-hash requirement that changes
      # every build and makes macOS forget the capture grant.
      #
      # Disable the hardened runtime in Debug ONLY: its library-validation flag is
      # what blocks xctest from injecting the test bundle into the (Developer ID
      # signed) host app. Turning it off does NOT change the signing identity, so
      # the TCC grant stays stable. Release keeps the hardened runtime ON for
      # notarization.
      ENABLE_HARDENED_RUNTIME: "NO"

targets:
  SampleMate:
    type: application
    platform: macOS
    sources:
      - path: SampleMate
    info:
      path: SampleMate/Info.plist
      properties:
        CFBundleDisplayName: Sample Mate
        CFBundleName: Sample Mate
        LSMinimumSystemVersion: "15.0"
        LSApplicationCategoryType: public.app-category.music
        NSHumanReadableCopyright: "© 2026"
        NSAudioCaptureUsageDescription: "Sample Mate captures audio from other apps (or all system output) so you can grab anything you play — YouTube, Spotify, Ableton, anywhere."
        NSHighResolutionCapable: true
    entitlements:
      path: SampleMate/SampleMate.entitlements
      properties:
        com.apple.security.get-task-allow: false   # required: notarization rejects this entitlement
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.palmer.SampleMate
        PRODUCT_NAME: SampleMate                               # → SampleMate.app (display name "Sample Mate")
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  SampleMateTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SampleMateTests
    dependencies:
      - target: SampleMate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.palmer.SampleMateTests
        GENERATE_INFOPLIST_FILE: "YES"
        # Hosted unit test: the test runner launches SampleMate.app as the host
        # process so @testable import SampleMate symbols are available at runtime.
        # In Debug the host's hardened runtime is OFF (see project-level Debug
        # config), so xctest can inject this bundle into the Developer-ID-signed
        # host without library-validation blocking it. The test bundle itself is
        # ad-hoc signed (it is not the TCC-tracked app, so this does not affect the
        # host app's audio-capture grant) and skips --timestamp (no notarization).
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SampleMate.app/Contents/MacOS/SampleMate"
        BUNDLE_LOADER: "$(BUILT_PRODUCTS_DIR)/SampleMate.app/Contents/MacOS/SampleMate"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: "NO"
        OTHER_CODE_SIGN_FLAGS: ""

schemes:
  SampleMate:
    build:
      targets:
        SampleMate: all
        SampleMateTests: [test]
    test:
      targets:
        - SampleMateTests
